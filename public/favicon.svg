<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0a0c0f"/>

  <!-- Board background -->
  <rect x="15" y="25" width="70" height="60" rx="8" fill="#a855f7"/>

  <!-- Grid cells -->
  <g fill="#0f1117">
    <!-- Row 1 -->
    <circle cx="30" cy="40" r="8"/>
    <circle cx="50" cy="40" r="8"/>
    <circle cx="70" cy="40" r="8"/>
    <!-- Row 2 -->
    <circle cx="30" cy="60" r="8"/>
    <circle cx="50" cy="60" r="8"/>
    <circle cx="70" cy="60" r="8"/>
  </g>

  <!-- Game pieces -->
  <circle cx="30" cy="60" r="7" fill="#ef4444"/>
  <circle cx="50" cy="60" r="7" fill="#eab308"/>
  <circle cx="70" cy="60" r="7" fill="#ef4444"/>
  <circle cx="50" cy="40" r="7" fill="#eab308"/>
</svg>
